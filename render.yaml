databases:
  - name: ecfr-db
    plan: starter

services:
  - type: web
    name: ecfr-analyzer
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && cd client && npm install && npm run build
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecfr-db
          property: connectionString
